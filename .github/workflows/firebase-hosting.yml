name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Firebase
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: ${{ secrets.GITHUB_TOKEN }} # Recommended for this action
        firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }} # Use your service account key secret
        projectId: docenclave-d5a43
        channelId: live # Specify the live channel
        # Optional: Specify the directory to deploy (defaults to firebase.json.hosting.public)
        # entryPoint: .
