name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Firebase
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DOCENCLAVE_APP }}
        projectId: docenclave-d5a43
        siteId: docenclave-d5a43 # Explicitly specify the hosting site ID
        # Optional: Specify the channel (e.g., "live" for production)
        # channelId: live
        # Optional: Specify the directory to deploy (defaults to firebase.json.hosting.public)
        # entryPoint: .
