# .github/workflows/Firebase hosting.yml
# This file deploys both the website (Hosting) and the backend (Functions).

name: Build and Deploy to Firebase

# This action will trigger on every push to the 'main' branch.
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    # Use the latest version of Ubuntu as the runner environment
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checks out your repository's code so the workflow can access it.
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up the specific Node.js version required by your Firebase Functions.
      - name: Set up Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Step 3: Install the dependencies for your backend functions.
      - name: Install Firebase Functions Dependencies
        run: npm --prefix functions install

      # Step 4: Use the official Google Auth action to securely log in.
      # This uses the secret key you stored in GitHub's settings.
      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          # CORRECTED to match your secret name
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}'

      # Step 5: Install the Firebase Command Line Interface (CLI).
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Step 6: Deploy to Firebase.
      - name: Deploy to Firebase Hosting and Functions
        run: firebase deploy --only hosting,functions --project docenclave-d5a43 --non-interactive --force