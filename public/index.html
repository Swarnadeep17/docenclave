<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocEnclave - Professional Document Tools</title>
    <meta name="description" content="Professional document processing tools. Merge PDFs, convert images, and more - all client-side and secure.">
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/src/css/main.css">
    <link rel="stylesheet" href="/src/css/components.css">
    <link rel="stylesheet" href="/src/css/responsive.css">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-spinner"></div>
            <p>Loading DocEnclave...</p>
        </div>

        <!-- Main Content -->
        <main id="main-content" style="display: none;">
            <!-- Header -->
            <header class="header">
                <div class="container">
                    <div class="header-content">
                        <div class="logo">
                            <h1>DocEnclave</h1>
                            <span class="tagline">Professional Document Tools</span>
                        </div>
                        <nav class="nav">
                            <div class="auth-section">
                                <button id="auth-btn" class="btn btn-outline">Sign In</button>
                                <div id="user-menu" class="user-menu" style="display: none;">
                                    <span id="user-name"></span>
                                    <button id="logout-btn" class="btn btn-text">Logout</button>
                                </div>
                            </div>
                        </nav>
                    </div>
                </div>
            </header>

            <!-- Hero Section -->
            <section class="hero">
                <div class="container">
                    <h2>Process Documents Securely</h2>
                    <p>All processing happens in your browser. Your files never leave your device.</p>
                    <div class="stats-display">
                        <div class="stat-item">
                            <span class="stat-number" id="monthly-visits">0</span>
                            <span class="stat-label">Monthly Visits</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="monthly-downloads">0</span>
                            <span class="stat-label">Files Processed</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Tools Section -->
            <section class="tools-section">
                <div class="container">
                    <div id="tools-container" class="tools-container">
                        <!-- Tools will be dynamically loaded here -->
                    </div>
                </div>
            </section>

            <!-- Tool Interface -->
            <div id="tool-interface" class="tool-interface" style="display: none;">
                <div class="container">
                    <div class="tool-header">
                        <button id="back-btn" class="btn btn-text">← Back to Tools</button>
                        <h3 id="tool-title"></h3>
                    </div>
                    <div id="tool-content"></div>
                </div>
            </div>
        </main>

        <!-- Auth Modal -->
        <div id="auth-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Sign In to DocEnclave</h3>
                    <button id="close-auth-modal" class="btn btn-text">×</button>
                </div>
                <div class="modal-body">
                    <div class="auth-tabs">
                        <button class="auth-tab active" data-tab="signin">Sign In</button>
                        <button class="auth-tab" data-tab="signup">Sign Up</button>
                    </div>
                    <div id="auth-forms"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>

    <!-- App Scripts -->
    <script src="/src/js/core/config.js"></script>
    <script src="/src/js/core/firebase-init.js"></script>
    <script src="/src/js/core/app.js"></script>
    <script src="/src/js/core/tool-loader.js"></script>
    <script src="/src/js/auth/auth.js"></script>
    <script src="/src/js/stats/stats.js"></script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => console.log('SW registered'))
                    .catch(error => console.log('SW registration failed'));
            });
        }
    </script>
</body>
</html>
